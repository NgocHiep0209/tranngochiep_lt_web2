spring.application.name=fashionstore

# ===========================
# DATABASE CONFIGURATION
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/fashion_store?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# SQL INIT (data.sql)
# Đã tắt: dữ liệu mẫu giờ do DataSeeder.java (CommandLineRunner) đảm nhiệm,
# chỉ insert khi bảng rỗng nên KHÔNG bị sinh trùng lặp mỗi lần chạy lại.
# ===========================
spring.sql.init.mode=never

# ===========================
# SERVER
# ===========================
server.port=8080

# ===========================
# JWT CONFIGURATION
# ===========================
jwt.secret=FashionStore2026SecretKeyForJWTTokenGeneration!@#$%^&*()VeryLongSecretKey
jwt.expiration-ms=86400000


# ===========================
# FILE UPLOAD
# ===========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB